{{- if eq (include "graphistry.tier.analytics" .) "true" }}
{{- if eq .Values.global.ENABLE_CLUSTER_MODE false }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  creationTimestamp: null
  labels:
    io.kompose.service: uploads-files
  name: uploads-files
  annotations:
    pv.kubernetes.io/bound-by-controller: "yes"
{{- if eq .Values.global.multiNode true  }}
    volume.beta.kubernetes.io/storage-provisioner: driver.longhorn.io
    volume.kubernetes.io/storage-provisioner: driver.longhorn.io

{{ else }}
    volume.beta.kubernetes.io/storage-provisioner: {{ .Values.global.provisioner }}
    volume.kubernetes.io/storage-provisioner: {{ .Values.global.provisioner }}
{{- end }}
  finalizers:
  - kubernetes.io/pvc-protection
spec:
{{- if eq .Values.global.multiNode true  }}
  accessModes:
    - ReadWriteMany
  storageClassName: datamount-longhorn
{{- else }}
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.global.storageClassNameOverride | default "retain-sc" }}
{{- end }}
{{- if .Values.volumeName.uploadsFiles }}
  volumeName: {{ .Values.volumeName.uploadsFiles }}
{{- end }}
  resources:
    requests:
      storage: 40Gi
status: {}
{{- end }}
{{- end }}
