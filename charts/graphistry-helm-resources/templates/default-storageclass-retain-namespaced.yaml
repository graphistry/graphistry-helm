{{- if eq .Values.global.multiNode false  }}
{{- if eq .Values.global.ENABLE_CLUSTER_MODE false  }}
# Namespace-suffixed retain storage class for multi-tenant isolation.
# Used by postgres-cluster chart for pgBackRest backup repos.
# Allows multiple single-node deployments in different namespaces
# on the same cluster without storage class conflicts.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  annotations:
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
  name: retain-sc-{{ .Release.Namespace }}
{{- if .Values.graphistryResources.storageClassParameters }}
parameters:
{{ toYaml .Values.graphistryResources.storageClassParameters | indent 2 }}
{{- end }}
provisioner: {{ .Values.global.provisioner }}
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
{{- end }}
{{- end }}
