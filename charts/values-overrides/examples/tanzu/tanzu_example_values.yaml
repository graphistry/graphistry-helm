# Tanzu Kubernetes Grid (TKG) Example Values for Graphistry
# Based on vSphere CSI storage provisioner

tls: false

# Volume PV names - populate after initial deployment for upgrades
volumeName:
  dataMount:
  localMediaMount:
  gakPublic:
  gakPrivate:

# Kubernetes Dashboard (optional)
k8sDashboard:
  enabled: false
  readonly: false
  createServiceAccount: false

# Ingress configuration for NGINX Ingress Controller
ingress:
  management:
    annotations:
      kubernetes.io/ingress.class: nginx

# Resource configurations - adjust based on your node capacity
CaddyResources: {}
DaskSchedulerResources: {}
DaskWorkerResources: {}
ForgeETLPythonResources: {}
GAKResources: {}
NexusResources: {}
NginxResources: {}
InitContainerResources: {}
NotebookResources: {}
PivotResources: {}
RedisResources: {}
StreamglGpuResources: {}
StreamglSessionsResources: {}
StreamglVizResources: {}

# Environment settings
nodeEnv: production
appEnvironment: production
djangoSettingsModule: "config.settings.production"
graphistryCPUMode: "0"
djangoDebug: "False"
metrics: false

# Graph App Kit dashboards
graphAppKitPublic: true
graphAppKitPrivate: true

# Forge workers - recommend 1 per 4 GB GPU memory
forgeWorkers: "1"

# CUDA version - 12.8 supports modern GPUs including Blackwell
cuda:
  version: "12.8"

global:
  # Ingress class for newer K8s versions
  ingressClassName: nginx

  # vSphere CSI storage provisioner for Tanzu
  provisioner: csi.vsphere.vmware.com

  # Node selector - adjust label based on your GPU node labels
  # Check available labels with: kubectl get nodes --show-labels
  nodeSelector:
    # Common Tanzu/vSphere GPU node labels:
    # nvidia.com/gpu.present: "true"           # Set by NVIDIA GPU Operator
    # OR use a custom label set by your admin:
    # node-role.kubernetes.io/gpu: "true"
    nvidia.com/gpu.present: "true"

  # Single-node deployment settings
  multiNode: false
  ENABLE_CLUSTER_MODE: false

  # Dev mode - set to false for production
  devMode: false

  # Postgres configuration
  postgres:
    repository: graphistry-postgres
    name: graphistry
    user: graphistry
    port: 5432
    host: postgres

  # Graphistry version - update to latest available
  tag: v2.45.11

  # Image settings
  imagePullPolicy: Always
  restartPolicy: Always
  imagePullSecrets:
    - name: docker-secret-prod

  # Log levels: INFO (default), DEBUG, TRACE (for troubleshooting)
  logs:
    LogLevel: INFO
    GraphistryLogLevel: INFO

  # Telemetry: https://graphistry-admin-docs.readthedocs.io/en/latest/telemetry/kubernetes.html
  ENABLE_OPEN_TELEMETRY: true
  telemetryStack:
    OTEL_CLOUD_MODE: false

